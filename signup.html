<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>GoldenHive | Join the Hive – Sign Up</title>
  <link rel="icon" type="image/jpeg" href="image/honeyworks (1).jpg">

  <!-- EXACT FONTS: Playfair Display + Poppins -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-gradient-start: #ffffff;
      --bg-gradient-end: #ffffff;
      --text-primary: #2d1f1a;
      --text-secondary: #6b4c3a;
      --card-bg: rgba(255, 255, 255, 0.96);
      --accent-color: #FC870D;
      --accent-hover: #e07608;
      --accent-light: #fff0e0;
      --shadow-sm: 0 8px 24px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 20px 35px -10px rgba(0, 0, 0, 0.12);
      --border-light: #f0e4d8;
      --input-bg: #ffffff;
      --error-color: #e74c3c;
      --font-heading: 'Playfair Display', serif;
      --font-body: 'Poppins', sans-serif;
    }

    /* DARK MODE: Card background becomes pure BLACK, body also black for premium deep look */
    body.dark {
      --bg-gradient-start: #000000;
      --bg-gradient-end: #000000;
      --text-primary: #f5f0eb;
      --text-secondary: #c0b0a0;
      --card-bg: #000000;
      --accent-color: #FC9F2E;
      --accent-hover: #FDAE4C;
      --accent-light: #2a2a1a;
      --border-light: #2a2a2a;
      --input-bg: #111111;
      --shadow-md: 0 20px 35px -8px rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: var(--font-body);
      background: #ffffff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 16px;
      transition: background 0.3s ease, color 0.2s;
      position: relative;
      overflow-y: auto;
    }

    body.dark {
      background: #000000;
    }

    /* Signup Container – compact width, fits viewport */
    .signup-container {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      animation: fadeInUp 0.4s ease-out;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px);}
      to { opacity: 1; transform: translateY(0);}
    }

    /* Card styling */
    .signup-card {
      background: var(--card-bg);
      backdrop-filter: blur(0px);
      border-radius: 32px;
      padding: 18px 24px 22px 24px;
      box-shadow: var(--shadow-md);
      border: 1px solid rgba(252, 135, 13, 0.3);
      transition: all 0.3s ease;
    }

    body.dark .signup-card {
      border: 1px solid rgba(252, 159, 46, 0.35);
      box-shadow: 0 20px 35px -8px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(252, 159, 46, 0.1);
    }

    /* Logo Section */
    .logo-section {
      text-align: center;
      margin-bottom: 10px;
    }

    .logo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 4px;
      cursor: pointer;
    }

    .logo-icon {
      font-size: 2rem;
      filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
      color: #FC870D;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0);}
      50% { transform: translateY(-2px);}
    }

    .logo-text {
      font-size: 1.7rem;
      font-weight: 800;
      background: linear-gradient(45deg, #FC870D, #FC9F2E);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      font-family: 'Playfair Display', serif;
      letter-spacing: -0.3px;
    }

    .logo-text a {
      text-decoration: none;
      background: linear-gradient(45deg, #FC870D, #FC9F2E);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-tagline {
      font-size: 0.6rem;
      color: var(--text-secondary);
      background: rgba(252, 135, 13, 0.12);
      display: inline-block;
      padding: 3px 10px;
      border-radius: 40px;
      font-family: var(--font-body);
      font-weight: 500;
    }

    /* Card Title */
    .card-title {
      text-align: center;
      margin-bottom: 12px;
    }

    .card-title h1 {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: var(--font-heading);
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .card-title p {
      font-size: 0.75rem;
      color: var(--text-secondary);
      font-family: var(--font-body);
    }

    .form-group {
      margin-bottom: 12px;
    }

    .input-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 5px;
      color: var(--text-primary);
      font-family: var(--font-body);
    }

    .input-label i {
      margin-right: 6px;
      color: #FC870D;
      width: 18px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    /* Input field styles — no inner icons, clean padding */
    .input-field {
      width: 100%;
      padding: 9px 14px 9px 16px;
      border: 2px solid var(--border-light);
      border-radius: 60px;
      font-size: 0.85rem;
      font-family: var(--font-body);
      background: var(--input-bg);
      color: var(--text-primary);
      transition: all 0.2s;
      outline: none;
    }

    .input-field:focus {
      border-color: #FC870D;
      box-shadow: 0 0 0 3px rgba(252, 135, 13, 0.2);
    }

    body.dark .input-field {
      border-color: #3a3a3a;
      background: #0c0c0c;
    }
    body.dark .input-field:focus {
      border-color: #FC9F2E;
      box-shadow: 0 0 0 3px rgba(252, 159, 46, 0.3);
    }

    .password-toggle {
      position: absolute;
      right: 14px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 0.9rem;
      transition: color 0.2s;
      padding: 4px;
    }

    .password-toggle:hover {
      color: #FC870D;
    }

    .pwd-hint {
      font-size: 0.6rem;
      margin-top: 3px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .terms-row {
      margin: 8px 0 12px;
    }

    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      font-family: var(--font-body);
      font-size: 0.7rem;
    }

    .checkbox-label input {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #FC870D;
    }

    .checkbox-label a {
      color: #FC870D;
      text-decoration: none;
      font-weight: 600;
    }

    .checkbox-label a:hover {
      text-decoration: underline;
    }

    .signup-btn {
      width: 100%;
      background: #FC870D;
      border: none;
      padding: 10px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 0.85rem;
      color: white;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-body);
      margin-bottom: 14px;
    }

    .signup-btn:hover {
      background: #e07608;
      transform: translateY(-1px);
      box-shadow: 0 8px 16px rgba(252, 135, 13, 0.25);
    }

    .divider {
      display: flex;
      align-items: center;
      text-align: center;
      margin: 12px 0;
      color: var(--text-secondary);
      font-size: 0.7rem;
      font-family: var(--font-body);
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      border-bottom: 1px solid var(--border-light);
    }

    .divider span {
      padding: 0 12px;
    }

    .social-login {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 14px;
    }

    .social-btn {
      flex: 1;
      background: transparent;
      border: 2px solid var(--border-light);
      border-radius: 60px;
      padding: 7px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-family: var(--font-body);
      font-weight: 500;
    }

    .social-btn:hover {
      border-color: #FC870D;
      background: rgba(252, 135, 13, 0.08);
      transform: translateY(-1px);
    }

    .social-btn i { font-size: 0.9rem; }
    .social-btn.google i { color: #db4437; }
    .social-btn.apple i { color: #000000; }
    body.dark .social-btn.apple i { color: #ffffff; }

    .login-link {
      text-align: center;
      font-size: 0.7rem;
      color: var(--text-secondary);
      font-family: var(--font-body);
      margin-top: 2px;
    }

    .login-link a {
      color: #FC870D;
      text-decoration: none;
      font-weight: 600;
    }
    
    .login-link a i {
      transition: transform 0.2s;
    }

    /* Top Controls */
    .top-controls {
      position: fixed;
      top: 12px;
      right: 16px;
      display: flex;
      gap: 10px;
      z-index: 1000;
    }
    body[dir="rtl"] .top-controls {
      right: auto;
      left: 16px;
    }

    .control-icon {
      background: var(--card-bg);
      border: 1px solid rgba(252, 135, 13, 0.4);
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      backdrop-filter: blur(4px);
    }

    body.dark .control-icon {
      background: #000000;
      border-color: rgba(252, 159, 46, 0.5);
    }

    .control-icon:hover {
      transform: scale(1.03);
      border-color: #FC870D;
      background: rgba(252, 135, 13, 0.15);
    }

    .control-icon i {
      font-size: 1rem;
      color: #FC870D;
    }

    .rtl-text-btn {
      background: var(--card-bg);
      border: 1px solid rgba(252, 135, 13, 0.4);
      padding: 0 12px;
      height: 38px;
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.2s;
      backdrop-filter: blur(4px);
      font-weight: 600;
      font-size: 0.7rem;
      font-family: var(--font-body);
      color: #FC870D;
      gap: 6px;
    }

    body.dark .rtl-text-btn {
      background: #000000;
      border-color: rgba(252, 159, 46, 0.5);
    }

    .rtl-text-btn:hover {
      transform: scale(1.02);
      border-color: #FC870D;
      background: rgba(252, 135, 13, 0.15);
    }

    .error-message {
      background: rgba(231, 76, 60, 0.12);
      border-left: 4px solid #e74c3c;
      padding: 8px 12px;
      border-radius: 14px;
      margin-bottom: 12px;
      font-size: 0.7rem;
      color: #e74c3c;
      display: none;
    }

    .error-message.show { display: flex; gap: 8px; align-items: center; }

    .signup-btn.loading {
      pointer-events: none;
      opacity: 0.8;
    }
    .signup-btn.loading i {
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg);}
      to { transform: rotate(360deg);}
    }

    /* ========= RTL SPECIFIC ALIGNMENT (no input icons, clean) ========= */
    body[dir="rtl"] .input-field {
      padding: 9px 16px 9px 14px;
      text-align: right;
    }

    body[dir="rtl"] .password-toggle {
      right: auto;
      left: 14px;
    }

    body[dir="rtl"] .input-label i {
      margin-right: 0;
      margin-left: 6px;
    }

    body[dir="rtl"] .checkbox-label {
      flex-direction: row-reverse;
    }

    body[dir="rtl"] .social-btn {
      flex-direction: row-reverse;
    }

    body[dir="rtl"] .login-link a i {
      transform: rotate(180deg);
      display: inline-block;
    }

    body[dir="rtl"] .logo-wrapper {
      flex-direction: row-reverse;
    }

    body[dir="rtl"] .card-title,
    body[dir="rtl"] .login-link,
    body[dir="rtl"] .pwd-hint,
    body[dir="rtl"] .input-label {
      text-align: right;
    }

    body[dir="rtl"] .checkbox-label span {
      text-align: right;
    }

    body[dir="rtl"] .error-message {
      border-left: none;
      border-right: 4px solid #e74c3c;
    }

    /* Responsive adjustments */
    @media (max-width: 560px) {
      .signup-card { padding: 16px 20px 20px 20px; }
      .logo-text { font-size: 1.5rem; }
      .card-title h1 { font-size: 1.3rem; }
    }
    @media (max-height: 660px) {
      .signup-card { padding: 14px 20px 18px 20px; }
      .form-group { margin-bottom: 10px; }
      .card-title { margin-bottom: 8px; }
      .logo-section { margin-bottom: 6px; }
      .social-login { margin-bottom: 10px; }
    }

    /* Extra spacing on mobile to avoid overlap with fixed top buttons */
    @media (max-width: 420px) {
      .top-controls {
        top: 6px;
        right: 8px;
        gap: 6px;
        transform: scale(0.9);
      }
      body[dir="rtl"] .top-controls {
        left: 8px;
        right: auto;
      }
      .control-icon, .rtl-text-btn {
        transform: scale(0.96);
      }
      .signup-container {
        margin-top: 40px;
      }
    }
    @media (max-width: 380px) {
      .signup-card {
        padding: 14px 16px 18px 16px;
        border-radius: 26px;
      }
      .signup-container {
        margin-top: 48px;
      }
      .logo-text {
        font-size: 1.3rem;
      }
    }

    /* subtle background honey decor */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      pointer-events: none;
      background-image: radial-gradient(circle at 10% 20%, rgba(252, 135, 13, 0.03) 0%, transparent 70%);
      z-index: -1;
    }
    body.dark::before {
      background-image: radial-gradient(circle at 10% 20%, rgba(252, 159, 46, 0.06) 0%, transparent 80%);
    }
    body::after {
      content: '🍯';
      position: fixed;
      bottom: 12px;
      left: 12px;
      font-size: 1.2rem;
      opacity: 0.08;
      pointer-events: none;
      z-index: -1;
    }
    body.dark::after { opacity: 0.06; }
    body[dir="rtl"]::after { left: auto; right: 12px; }
  </style>
</head>
<body>

<div class="top-controls">
  <div class="control-icon" id="themeToggle" title="Dark/Light Mode">
    <i class="fas fa-moon"></i>
  </div>
  <div class="rtl-text-btn" id="rtlToggleBtn">
     <span id="rtlBtnText">RTL</span>
  </div>
</div>

<div class="signup-container">
  <div class="signup-card">
    <div class="logo-section">
      <div class="logo-wrapper" id="logoDoubleClick">
        <i class="fas fa-jar logo-icon"></i>
        <span class="logo-text"><a href="index.html">GoldenHive</a></span>
      </div>
      <div class="logo-tagline">
        <i class="fas fa-droplet"></i> Artisanal Honey & Beeswax Apothecary
      </div>
    </div>

    <div class="card-title">
      <h1>Create an Account</h1>
      <p>Join our hive and enjoy pure, raw honey benefits</p>
    </div>

    <div id="signupError" class="error-message">
      <i class="fas fa-exclamation-triangle"></i> <span id="errorText">Please fix errors above</span>
    </div>

    <form id="signupForm" novalidate>
      <!-- Full Name (icons removed inside input) -->
      <div class="form-group">
        <label class="input-label"><i class="fas fa-user"></i> Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="fullName" class="input-field" placeholder="e.g., Emma Watson" required>
        </div>
      </div>

      <!-- Email Address -->
      <div class="form-group">
        <label class="input-label"><i class="fas fa-envelope"></i> Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="emailSignup" class="input-field" placeholder="hello@goldenhive.com" required>
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="input-label"><i class="fas fa-lock"></i> Password</label>
        <div class="input-wrapper">
          <input type="password" id="passwordSignup" class="input-field" placeholder="Create a strong password" required>
          <button type="button" class="password-toggle" id="togglePassword1">
            <i class="far fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="input-label"><i class="fas fa-check-circle"></i> Confirm Password</label>
        <div class="input-wrapper">
          <input type="password" id="confirmPassword" class="input-field" placeholder="Confirm your password" required>
          <button type="button" class="password-toggle" id="togglePassword2">
            <i class="far fa-eye-slash"></i>
          </button>
        </div>
      </div>

      <!-- Terms & Conditions -->
      <div class="terms-row">
        <label class="checkbox-label">
          <input type="checkbox" id="termsCheckbox"> 
          <span>I agree to the <a href="#" id="termsLink">Terms of Service</a> and <a href="#" id="privacyLink">Privacy Policy</a></span>
        </label>
      </div>

      <button type="submit" class="signup-btn" id="signupBtn">
        <i class="fas fa-hive"></i> Join GoldenHive
      </button>
    </form>

    <div class="divider">
      <span>or sign up with</span>
    </div>

    <div class="social-login">
      <button class="social-btn google" id="googleSignup">
        <i class="fab fa-google"></i> <span>Google</span>
      </button>
      <button class="social-btn apple" id="appleSignup">
        <i class="fab fa-apple"></i> <span>Apple</span>
      </button>
    </div>

    <div class="login-link">
      Already have an account? <a href="login.html" id="loginRedirectLink">Sign In <i class="fas fa-arrow-right"></i></a>
    </div>
  </div>
</div>

<script>
  (function() {
    // DOM elements
    const form = document.getElementById('signupForm');
    const fullNameInput = document.getElementById('fullName');
    const emailInput = document.getElementById('emailSignup');
    const passwordInput = document.getElementById('passwordSignup');
    const confirmInput = document.getElementById('confirmPassword');
    const termsCheck = document.getElementById('termsCheckbox');
    const signupBtn = document.getElementById('signupBtn');
    const errorDiv = document.getElementById('signupError');
    const errorTextSpan = document.getElementById('errorText');

    // Password toggles
    const togglePwd1 = document.getElementById('togglePassword1');
    const togglePwd2 = document.getElementById('togglePassword2');

    const EXISTING_DEMO_EMAIL = "golden@goldenhive.com";

    function showError(message) {
      errorTextSpan.innerText = message;
      errorDiv.classList.add('show');
      setTimeout(() => {
        errorDiv.classList.remove('show');
      }, 3500);
    }

    function clearError() {
      errorDiv.classList.remove('show');
    }

    function validateForm() {
      const fullName = fullNameInput.value.trim();
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const confirm = confirmInput.value;
      const termsAccepted = termsCheck.checked;

      if (!fullName) {
        showError('Please enter your full name.');
        fullNameInput.focus();
        return false;
      }
      if (fullName.length < 2) {
        showError('Full name must be at least 2 characters.');
        fullNameInput.focus();
        return false;
      }
      if (!email) {
        showError('Email address is required.');
        emailInput.focus();
        return false;
      }
      const emailPattern = /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/;
      if (!emailPattern.test(email)) {
        showError('Please enter a valid email address (e.g., name@domain.com).');
        emailInput.focus();
        return false;
      }
      if (email.toLowerCase() === EXISTING_DEMO_EMAIL) {
        showError('This email is already registered. Please sign in instead.');
        emailInput.focus();
        return false;
      }
      if (!password) {
        showError('Password is required.');
        passwordInput.focus();
        return false;
      }
      if (password.length < 6) {
        showError('Password must be at least 6 characters long.');
        passwordInput.focus();
        return false;
      }
      const hasLetter = /[a-zA-Z]/.test(password);
      const hasNumber = /\d/.test(password);
      if (!hasLetter || !hasNumber) {
        showError('Password must contain at least one letter and one number.');
        passwordInput.focus();
        return false;
      }
      if (password !== confirm) {
        showError('Passwords do not match. Please re-enter.');
        confirmInput.focus();
        return false;
      }
      if (!termsAccepted) {
        showError('You must agree to the Terms of Service and Privacy Policy.');
        return false;
      }
      return true;
    }

    function simulateSignup() {
      signupBtn.classList.add('loading');
      const originalHTML = signupBtn.innerHTML;
      signupBtn.innerHTML = '🍯 Creating account...';
      
      setTimeout(() => {
        signupBtn.classList.remove('loading');
        signupBtn.innerHTML = originalHTML;
        localStorage.setItem('goldenhive_signup_success', 'true');
        alert('🍯 Welcome to the Hive, ' + fullNameInput.value.trim() + '!\n✨ Your account has been created successfully. Please verify your email (demo) and log in.\n\n🔐 You can now sign in with your credentials.');
        form.reset();
        termsCheck.checked = false;
        setTimeout(() => {
          if (confirm('Would you like to go to the Login page now?')) {
            window.location.href = 'login.html';
          }
        }, 200);
      }, 1000);
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      clearError();
      if (validateForm()) {
        simulateSignup();
      }
    });

    // Password visibility
    let pwdVisible1 = false, pwdVisible2 = false;
    togglePwd1.addEventListener('click', () => {
      pwdVisible1 = !pwdVisible1;
      passwordInput.type = pwdVisible1 ? 'text' : 'password';
      togglePwd1.innerHTML = pwdVisible1 ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
    });
    togglePwd2.addEventListener('click', () => {
      pwdVisible2 = !pwdVisible2;
      confirmInput.type = pwdVisible2 ? 'text' : 'password';
      togglePwd2.innerHTML = pwdVisible2 ? '<i class="far fa-eye"></i>' : '<i class="far fa-eye-slash"></i>';
    });

    // Theme handling (dark mode with black card background)
    const body = document.body;
    const themeIcon = document.getElementById('themeToggle').querySelector('i');
    function setDarkMode(enabled) {
      if (enabled) {
        body.classList.add('dark');
        themeIcon.classList.remove('fa-moon');
        themeIcon.classList.add('fa-sun');
        localStorage.setItem('goldenhive-dark', 'enabled');
      } else {
        body.classList.remove('dark');
        themeIcon.classList.remove('fa-sun');
        themeIcon.classList.add('fa-moon');
        localStorage.setItem('goldenhive-dark', 'disabled');
      }
    }
    const savedDark = localStorage.getItem('goldenhive-dark');
    setDarkMode(savedDark === 'enabled');
    document.getElementById('themeToggle').addEventListener('click', () => setDarkMode(!body.classList.contains('dark')));

    // RTL handling with preserved alignment (no input icons)
    const htmlElem = document.documentElement;
    const rtlToggleBtn = document.getElementById('rtlToggleBtn');
    const rtlBtnTextSpan = document.getElementById('rtlBtnText');
    function setDirection(direction) {
      htmlElem.setAttribute('dir', direction);
      localStorage.setItem('goldenhive-dir', direction);
      rtlBtnTextSpan.innerText = direction === 'rtl' ? 'LTR' : 'RTL';
    }
    const savedDir = localStorage.getItem('goldenhive-dir');
    setDirection(savedDir === 'rtl' ? 'rtl' : 'ltr');
    rtlToggleBtn.addEventListener('click', () => {
      const currentDir = htmlElem.getAttribute('dir');
      setDirection(currentDir === 'rtl' ? 'ltr' : 'rtl');
    });

    // Social demo
    document.getElementById('googleSignup').addEventListener('click', () => alert('🔐 Google Sign-Up (Demo) — Secure authentication coming soon.'));
    document.getElementById('appleSignup').addEventListener('click', () => alert('🍎 Apple Sign-Up (Demo) — Seamless registration experience.'));

    // Terms & privacy modals
    document.getElementById('termsLink').addEventListener('click', (e) => { e.preventDefault(); alert('📜 GoldenHive Terms of Service: We respect nature, pollinators and your privacy. Demo version.'); });
    document.getElementById('privacyLink').addEventListener('click', (e) => { e.preventDefault(); alert('🍯 Privacy Policy: Your data is honey-sweet and protected. No third-party sharing.'); });

    // Double-click logo autofill demo data (works with clean fields)
    const logoWrapper = document.querySelector('.logo-wrapper');
    if (logoWrapper) {
      logoWrapper.addEventListener('dblclick', () => {
        fullNameInput.value = "Amber Honeyfield";
        emailInput.value = "amber@goldenhive.com";
        passwordInput.value = "Honeycomb123";
        confirmInput.value = "Honeycomb123";
        termsCheck.checked = true;
        showError('🍯 Demo sign-up filled! Click "Join GoldenHive" to create demo account.');
        setTimeout(() => errorDiv.classList.remove('show'), 2500);
      });
    }
    
    const loginRedirect = document.getElementById('loginRedirectLink');
    if (loginRedirect) loginRedirect.href = "login.html";
  })();
</script>
</body>
</html>
